services:
  postgresdb:
    image: postgres:15
    restart: unless-stopped
    container_name: formcraft-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-formcraft}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    container_name: formcraft-redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${DOCKER_IMAGE_API:?DOCKER_IMAGE_API is required}
    restart: unless-stopped
    container_name: formcraft-api
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
    ports:
      - "${API_PORT:-3201}:3001"
    depends_on:
      postgresdb:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: ${DOCKER_IMAGE_WEB:?DOCKER_IMAGE_WEB is required}
    restart: unless-stopped
    container_name: formcraft-web
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "${WEB_PORT:-3200}:3000"
    depends_on:
      - api

volumes:
  pg_data:
  redis_data:
