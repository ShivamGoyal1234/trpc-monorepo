# FormCraft — Nginx reverse proxy
# Domain: formcraft.shivam-goyal.site
#
# Install on VPS:
#   sudo cp deploy/nginx/formcraft.shivam-goyal.site.conf /etc/nginx/sites-available/formcraft
#   sudo ln -sf /etc/nginx/sites-available/formcraft /etc/nginx/sites-enabled/formcraft
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (Let's Encrypt):
#   sudo certbot --nginx -d formcraft.shivam-goyal.site
#
# Production .env (same origin for web + API):
#   NEXT_PUBLIC_APP_URL=https://formcraft.shivam-goyal.site
#   NEXT_PUBLIC_API_URL=https://formcraft.shivam-goyal.site
#   API_URL=https://formcraft.shivam-goyal.site
#   APP_URL=https://formcraft.shivam-goyal.site
#   NEXTAUTH_URL=https://formcraft.shivam-goyal.site
#   GOOGLE_REDIRECT_URI=https://formcraft.shivam-goyal.site/auth/google/callback
#   CORS_ORIGIN=https://formcraft.shivam-goyal.site

upstream formcraft_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream formcraft_api {
    server 127.0.0.1:3001;
    keepalive 32;
}

# Redirect HTTP → HTTPS (enable after certbot or when TLS cert exists)
server {
    listen 80;
    listen [::]:80;
    server_name formcraft.shivam-goyal.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name formcraft.shivam-goyal.site;

    # Certbot will populate these paths (or set manually)
    ssl_certificate     /etc/letsencrypt/live/formcraft.shivam-goyal.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/formcraft.shivam-goyal.site/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam           /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10M;

    # API routes (Express + tRPC)
    location /trpc {
        proxy_pass http://formcraft_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /auth {
        proxy_pass http://formcraft_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location = /health {
        proxy_pass http://formcraft_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    location = /openapi.json {
        proxy_pass http://formcraft_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js web app (everything else)
    location / {
        proxy_pass http://formcraft_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_buffering off;
    }
}

